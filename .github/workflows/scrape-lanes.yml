name: Scrape CCC Lane Availability

on:
  schedule:
    # Every Monday at 7am NZT (Sunday 6pm UTC)
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: swim-lanes-chch/swim-lanes-chch/package-lock.json

      - name: Install dependencies
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: npm ci

      - name: Install Puppeteer
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: npm install puppeteer --save-dev

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2

      - name: Run scraper
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: node scripts/scrape.js

      - name: Check if data.js changed
        id: diff
        run: |
          if git diff --quiet swim-lanes-chch/swim-lanes-chch/src/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data.js
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swim-lanes-chch/swim-lanes-chch/src/data.js
          git commit -m "chore: auto-update lane data $(date -u '+%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Lane data unchanged — no commit needed"
