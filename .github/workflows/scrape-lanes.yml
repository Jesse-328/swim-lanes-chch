name: Scrape CCC Lane Availability

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: npm ci

      - name: Install Puppeteer
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: npm install puppeteer --save-dev

      - name: Run scraper
        working-directory: swim-lanes-chch/swim-lanes-chch
        run: node scripts/scrape.js
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'

      - name: Check if data.js changed
        id: diff
        run: |
          if git diff --quiet swim-lanes-chch/swim-lanes-chch/src/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data.js
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swim-lanes-chch/swim-lanes-chch/src/data.js
          git commit -m "chore: auto-update lane data $(date -u '+%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Lane data unchanged — no commit needed"
