<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1b2a" />
    <meta name="description" content="Find the quietest swim lanes across Christchurch pools." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swim Lanes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <title>Swim Lanes Ōtautahi</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0d1b2a;
        color: #f5ede0;
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      @keyframes ripple {
        0%   { transform: scale(0.8); opacity: 0.7; }
        100% { transform: scale(2.6); opacity: 0; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 24px rgba(126,202,195,0.10); }
        50%       { box-shadow: 0 0 42px rgba(126,202,195,0.28); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .fade-up  { animation: fadeUp 0.35s ease forwards; }
      .spinning { animation: spin 0.9s linear infinite; display: inline-block; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a4a5e; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
